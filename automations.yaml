# =============================================================================
#  Pool Automation – Home Assistant Automations
#  These replace the manual automations in pool.yaml.
#  The heavy logic now lives in the custom component; these automations
#  handle scheduling, safety checks, and notifications.
# =============================================================================

# ---------------------------------------------------------------------------
# pH MANAGEMENT  – runs every hour, doses if priority = ph and conditions met
# ---------------------------------------------------------------------------
- id: pool_auto_dose_ph
  alias: "Pool Auto Dose pH"
  description: "Automatically dose HCl when pH is high and conditions are met"
  trigger:
    - platform: time_pattern
      hours: "/1"
  condition:
    - condition: state
      entity_id: sensor.pool_management_priority   # from the component
      state: "ph"
    - condition: state
      entity_id: switch.pool_automation_mode       # component switch
      state: "on"
    - condition: state
      entity_id: binary_sensor.pool_kit_pump_state_ph_down
      state: "off"
    - condition: state
      entity_id: binary_sensor.pool_kit_pump_state_orp
      state: "off"
    - condition: numeric_state
      entity_id: sensor.cirkulation_rpm
      above: 1000
    - condition: state
      entity_id: timer.chemicals_dosed
      state: "idle"
  action:
    - service: button.press
      target:
        entity_id: button.pool_dose_ph_down         # component button
    - service: timer.start
      entity_id: timer.chemicals_dosed
    - service: notify.mobile_app_peter_iphone
      data:
        message: >
          pH-dosering startad. Dos: {{ states('sensor.pool_ph_dose') }} mL
          (pH nu: {{ states('sensor.pool_kit_ezo_ph_level') }})

# ---------------------------------------------------------------------------
# CHLORINE MANAGEMENT – runs every hour
# ---------------------------------------------------------------------------
- id: pool_auto_dose_chlorine
  alias: "Pool Auto Dose Chlorine"
  description: "Automatically dose NaClO when free chlorine is low and conditions are met"
  trigger:
    - platform: time_pattern
      hours: "/1"
  condition:
    - condition: state
      entity_id: sensor.pool_management_priority
      state: "chlorine"
    - condition: state
      entity_id: switch.pool_automation_mode
      state: "on"
    - condition: state
      entity_id: binary_sensor.pool_kit_pump_state_ph_down
      state: "off"
    - condition: state
      entity_id: binary_sensor.pool_kit_pump_state_orp
      state: "off"
    - condition: numeric_state
      entity_id: sensor.cirkulation_rpm
      above: 1000
    - condition: state
      entity_id: timer.chemicals_dosed
      state: "idle"
  action:
    - service: button.press
      target:
        entity_id: button.pool_dose_chlorine
    - service: timer.start
      entity_id: timer.chemicals_dosed
    - service: notify.mobile_app_peter_iphone
      data:
        message: >
          Klorering startad. Dos: {{ states('sensor.pool_chlorine_dose') }} mL
          (FC nu: {{ states('sensor.pool_free_chlorine_fc') }} ppm)

# ---------------------------------------------------------------------------
# FLOCCULANT – runs every hour when pH is in range and circulation is running
# ---------------------------------------------------------------------------
- id: pool_auto_dose_floc
  alias: "Pool Auto Dose Flocculant"
  description: "Dose flocculant hourly when pH in range and pump running"
  trigger:
    - platform: time_pattern
      hours: "/1"
  condition:
    - condition: state
      entity_id: switch.pool_automation_mode
      state: "on"
    - condition: numeric_state
      entity_id: sensor.cirkulation_rpm
      above: 1000
    - condition: numeric_state
      entity_id: sensor.pool_kit_ezo_ph_level
      above: 7.2
    - condition: numeric_state
      entity_id: sensor.pool_kit_ezo_ph_level
      below: 7.7
  action:
    - service: button.press
      target:
        entity_id: button.pool_dose_flocculant

# ---------------------------------------------------------------------------
# SEASON – open / close pool
# ---------------------------------------------------------------------------
- id: pool_open_summer
  alias: "Pool Open for Summer"
  trigger:
    - platform: state
      entity_id: input_boolean.pool_open
      to: "on"
  action:
    - service: scene.turn_on
      entity_id: scene.summer_open_pool
    - service: switch.turn_on
      target:
        entity_id: switch.pool_automation_mode
    - service: notify.mobile_app_peter_iphone
      data:
        message: "Pool öppen för sommaren! 🏊"

- id: pool_close_winter
  alias: "Pool Closed for Winter"
  trigger:
    - platform: state
      entity_id: input_boolean.pool_open
      to: "off"
  action:
    - service: scene.turn_on
      entity_id: scene.winter_close_pool
    - service: switch.turn_off
      target:
        entity_id: switch.pool_automation_mode
    - service: notify.mobile_app_peter_iphone
      data:
        message: "Pool stängd för vinter ❄️"

# ---------------------------------------------------------------------------
# NOTIFICATIONS – out-of-range alerts
# ---------------------------------------------------------------------------
- id: pool_notify_low_orp
  alias: "Pool: Notify Low ORP / Chlorine"
  trigger:
    - platform: numeric_state
      entity_id: sensor.pool_kit_ezo_orp_level
      below: 550
  action:
    - service: notify.mobile_app_peter_iphone
      data:
        message: "⚠️ Dags att lägga i klor. ORP: {{ states('sensor.pool_kit_ezo_orp_level') }} mV"

- id: pool_notify_high_orp
  alias: "Pool: Notify High ORP"
  trigger:
    - platform: numeric_state
      entity_id: sensor.pool_kit_ezo_orp_level
      above: 800
  action:
    - service: notify.mobile_app_peter_iphone
      data:
        message: "⚠️ Klor högt! ORP: {{ states('sensor.pool_kit_ezo_orp_level') }} mV"

- id: pool_notify_low_ph
  alias: "Pool: Notify Low pH"
  trigger:
    - platform: numeric_state
      entity_id: sensor.pool_kit_ezo_ph_level
      below: 7.2
  action:
    - service: notify.mobile_app_peter_iphone
      data:
        message: "⚠️ pH-värde lågt: {{ states('sensor.pool_kit_ezo_ph_level') }}"

- id: pool_notify_high_ph
  alias: "Pool: Notify High pH"
  trigger:
    - platform: numeric_state
      entity_id: sensor.pool_kit_ezo_ph_level
      above: 7.6
  action:
    - service: notify.mobile_app_peter_iphone
      data:
        message: "⚠️ pH-värde högt: {{ states('sensor.pool_kit_ezo_ph_level') }}"

- id: pool_notify_still_bad_after_dose
  alias: "Pool: Still not OK after dosing"
  trigger:
    - platform: state
      entity_id: timer.chemicals_dosed
      to: "idle"
  condition:
    - condition: or
      conditions:
        - condition: state
          entity_id: sensor.pool_management_priority
          state: "ph"
        - condition: state
          entity_id: sensor.pool_management_priority
          state: "chlorine"
  action:
    - service: notify.mobile_app_peter_iphone
      data:
        message: >
          ⚠️ Pool fortfarande inte OK efter dosering.
          Prioritet: {{ states('sensor.pool_management_priority') }}
          pH: {{ states('sensor.pool_kit_ezo_ph_level') }}
          FC: {{ states('sensor.pool_free_chlorine_fc') }} ppm

# ---------------------------------------------------------------------------
# DATA LOGGING – to Google Sheets every 30 min
# ---------------------------------------------------------------------------
- id: pool_log_to_sheets
  alias: "Pool Log to Google Sheets"
  trigger:
    - platform: time_pattern
      minutes: "/30"
  action:
    - service: google_sheets.append_sheet
      data:
        data:
          time: "{{ now().isoformat() }}"
          ph: "{{ states('sensor.pool_kit_ezo_ph_level') }}"
          orp: "{{ states('sensor.pool_kit_ezo_orp_level') }}"
          free_chlorine_ppm: "{{ states('sensor.pool_free_chlorine_fc') }}"
          volume_m3: "{{ states('number.pool_volume') }}"
          water_temp: "{{ states('sensor.pool_temperature') }}"
          priority: "{{ states('sensor.pool_management_priority') }}"

# ---------------------------------------------------------------------------
# TRAIN FC MODEL – when lab measurement is updated
# ---------------------------------------------------------------------------
- id: pool_train_fc_model
  alias: "Pool: Retrain FC model on lab measurement"
  description: "Publishes to MQTT whenever a manual lab FC reading is logged"
  trigger:
    - platform: state
      entity_id: input_number.lab_fc
  action:
    - service: mqtt.publish
      data:
        topic: "chlorine_model/train"
        payload: >
          {{ states('sensor.pool_kit_ezo_orp_level') }},{{ states('sensor.pool_kit_ezo_ph_level') }},{{ states('sensor.pool_temperature') }},{{ states('input_number.lab_fc') }}

# ---------------------------------------------------------------------------
# CHEMICAL TANK – track remaining volumes
# ---------------------------------------------------------------------------
- id: pool_init_hcl_volume
  alias: "Pool: Initialize HCl Volume"
  trigger:
    - platform: state
      entity_id: input_number.volume_hcl
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.remaining_hcl_volume
      data:
        value: "{{ states('input_number.volume_hcl') | float }}"

- id: pool_update_hcl_after_dose
  alias: "Pool: Update HCl remaining after dosing"
  trigger:
    - platform: state
      entity_id: binary_sensor.pool_kit_pump_state_ph_down
      from: "on"
      to: "off"
  action:
    - delay:
        seconds: 5
    - service: input_number.set_value
      target:
        entity_id: input_number.remaining_hcl_volume
      data:
        value: >
          {{ (states('input_number.remaining_hcl_volume') | float) -
             (states('sensor.pool_kit_current_volume_dosed_ph_down') | float) }}

- id: pool_init_naclo_volume
  alias: "Pool: Initialize NaClO Volume"
  trigger:
    - platform: state
      entity_id: input_number.volume_naclo
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.remaining_naclo_volume
      data:
        value: "{{ states('input_number.volume_naclo') | float }}"

- id: pool_update_naclo_after_dose
  alias: "Pool: Update NaClO remaining after dosing"
  trigger:
    - platform: state
      entity_id: binary_sensor.pool_kit_pump_state_orp
      from: "on"
      to: "off"
  action:
    - delay:
        seconds: 5
    - service: input_number.set_value
      target:
        entity_id: input_number.remaining_naclo_volume
      data:
        value: >
          {{ (states('input_number.remaining_naclo_volume') | float) -
             (states('sensor.pool_kit_current_volume_dosed_orp') | float) }}
